name: docs

# Build the docs site with Zensical and publish it to GitHub Pages on every push to main.
# Enable it once in the repo: Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "zensical.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One publish at a time; don't cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build the site
        run: uvx zensical@0.0.51 build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
