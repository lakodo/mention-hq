# Docs site config — built by Zensical (https://zensical.org), published to GitHub Pages.
# Content lives in docs/; `zensical build` writes the site to site/ (gitignored).

[project]
site_name = "Personal HQ"
site_description = "Aggregate your activity across GitHub, Linear, Slack, Notion, Dust and local files, grouped by subject."
site_author = "lakodo"
site_url = "https://lako.do/mention-hq/"
repo_url = "https://github.com/lakodo/mention-hq"
repo_name = "lakodo/mention-hq"
copyright = "Copyright &copy; 2026 lakodo"

nav = [
  { "Home" = "index.md" },
  { "Getting started" = "getting-started.md" },
  { "Concepts" = "concepts.md" },
  { "Screens" = [
    { "The board" = "screens/board.md" },
    { "Tasks" = "screens/tasks.md" },
    { "Catch-up" = "screens/catch-up.md" },
    { "Timeline" = "screens/timeline.md" },
    { "People" = "screens/people.md" },
    { "Admin" = "screens/admin.md" },
  ] },
  { "Sources" = "sources.md" },
  { "The AI brain" = "brain.md" },
]

[project.theme]
logo = "assets/icon.svg"
favicon = "assets/icon.svg"
features = [
  "content.code.copy",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/lakodo/mention-hq"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
