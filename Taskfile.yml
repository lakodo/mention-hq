version: "3"

includes:
  back:
    taskfile: ./backend/Taskfile.yml
    dir: ./backend
  front:
    taskfile: ./frontend/Taskfile.yml
    dir: ./frontend

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install everything and prepare the database (run this first)
    cmds:
      - task: back:setup
      - task: front:setup
      - echo "Personal HQ ready ✓  ->  task dev"

  dev:
    desc: Run backend (:13000) and frontend (:13001) together
    deps:
      - back:dev
      - front:dev

  proxy:set:
    desc: Choose the local domain to serve the app under, and write ops/Caddyfile
    cmds:
      - |
        read -rp "Local domain (e.g. myhq): " domain
        [ -n "$domain" ] || { echo "No domain given — nothing written."; exit 1; }
        sed "s/__DOMAIN__/$domain/g" ops/Caddyfile.example > ops/Caddyfile
        echo "Wrote ops/Caddyfile for https://$domain"
        echo "Point the name at your machine (once):"
        echo "  echo \"127.0.0.1 $domain\" | sudo tee -a /etc/hosts"
        echo "Then run: task proxy   (Caddy serves HTTPS with its local CA; first run"
        echo "installs the CA into your trust store, so the browser shows a real padlock)"

  proxy:
    desc: Serve the app at your bare domain (run alongside `task dev`; needs `task proxy:set` first)
    cmds:
      - |
        test -f ops/Caddyfile || {
          echo "No ops/Caddyfile yet. Run: task proxy:set"
          exit 1
        }
      # Caddy binds 443 (and 80 for the redirect), both privileged — so sudo, and an absolute
      # path because sudo drops the devbox PATH that put caddy there. It also installs its
      # local CA into the system trust store on first run, which likewise needs sudo. `task
      # dev` must already be running.
      - 'sudo "$(command -v caddy)" run --config ops/Caddyfile --adapter caddyfile'

  proxy:trust:
    desc: Install Caddy's local CA into the system trust store (run once if the padlock is missing)
    # `task proxy` does this automatically on first run; this is the explicit escape hatch —
    # after a "Not Secure" warning that won't clear, or to trust the cert in a second browser.
    cmds:
      - 'sudo "$(command -v caddy)" trust'

  up:
    desc: The whole stack behind your domain — backend + frontend + proxy (Caddy prompts for sudo)
    # Same parallel deps as `task dev`, plus the proxy. Each server tees to its own log;
    # Caddy asks for a password once (binds 443, installs its local CA). Needs `task
    # proxy:set` first. Ctrl-C stops all.
    deps:
      - back:dev
      - front:dev
      - proxy

  serve:
    desc: Build the UI and serve the whole app from the API alone, on :13000
    cmds:
      - task: front:build
      - task: back:dev

  test:
    desc: Run backend and frontend tests
    cmds:
      - task: back:test
      - task: front:test

  lint:
    desc: Lint backend and frontend
    cmds:
      - task: back:lint
      - task: front:lint

  check:
    desc: Everything CI would run — lint, types, migrations, tests
    cmds:
      - task: lint
      - task: front:typecheck
      - task: back:db-check
      - task: test

  hooks:
    desc: Install the git pre-commit hooks
    cmds:
      - uv run --with pre-commit pre-commit install
