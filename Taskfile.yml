version: "3"

includes:
  back:
    taskfile: ./backend/Taskfile.yml
    dir: ./backend
  front:
    taskfile: ./frontend/Taskfile.yml
    dir: ./frontend

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install everything and prepare the database (run this first)
    cmds:
      - task: back:setup
      - task: front:setup
      - echo "Personal HQ ready ✓  ->  task dev"

  dev:
    desc: Run backend (:13000) and frontend (:13001) together
    deps:
      - back:dev
      - front:dev

  proxy:
    desc: Serve the app at your bare domain (run alongside `task dev`; needs Caddyfile + hosts entry)
    cmds:
      # Your Caddyfile is gitignored — it carries whatever local name you picked. Scaffold
      # it from the template on first run and point the user at the domain to edit.
      - |
        test -f Caddyfile || {
          cp Caddyfile.example Caddyfile
          echo "Created Caddyfile from the template. Edit the domain in it, then add it to"
          echo "your hosts file (e.g. echo '127.0.0.1 myhq' | sudo tee -a /etc/hosts) and"
          echo "re-run: task proxy"
          exit 1
        }
      # Caddy binds port 80, which is privileged — so sudo, and an absolute path because
      # sudo drops the devbox PATH that put caddy there. `task dev` must already be running.
      - 'sudo "$(command -v caddy)" run --config Caddyfile --adapter caddyfile'

  serve:
    desc: Build the UI and serve the whole app from the API alone, on :13000
    cmds:
      - task: front:build
      - task: back:dev

  test:
    desc: Run backend and frontend tests
    cmds:
      - task: back:test
      - task: front:test

  lint:
    desc: Lint backend and frontend
    cmds:
      - task: back:lint
      - task: front:lint

  check:
    desc: Everything CI would run — lint, types, migrations, tests
    cmds:
      - task: lint
      - task: front:typecheck
      - task: back:db-check
      - task: test

  hooks:
    desc: Install the git pre-commit hooks
    cmds:
      - uv run --with pre-commit pre-commit install
