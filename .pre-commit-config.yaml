default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: local
    hooks:
      # --- hygiene ---
      # Hooks here never run `git add`: pre-commit holds the index while they run, so a
      # hook touching it fights for the lock. A hook that modifies a file fails, and
      # pre-commit tells you to re-stage — which is also the honest report.
      - id: trailing-whitespace
        name: "global:   trim trailing whitespace"
        language: system
        entry: bash -c 'for f in "$@"; do perl -pi -e "s/[ \t]+$//" "$f"; done' --
        types: [text]
        exclude: \.md$

      - id: comments-describe-the-code
        name: "global:   comments describe the code, not its history"
        language: system
        entry: python bin/check-comments.py
        types: [python]

      - id: no-assistant-attribution
        name: "global:   no Co-Authored-By / 'Generated with Claude' in commit message"
        language: system
        entry: python bin/check-commit-message.py
        stages: [commit-msg]
        always_run: true
        pass_filenames: true

      - id: check-private-key
        name: "security: block committed private keys"
        language: system
        entry: bash -c 'grep -lE "BEGIN (RSA|OPENSSH|DSA|EC|PGP) PRIVATE KEY" "$@" && exit 1 || exit 0' --
        types: [text]

      - id: no-secrets-in-env
        name: "security: block committed .env"
        language: fail
        entry: ".env must never be committed — secrets live in the OS keychain (see CLAUDE.md)"
        files: ^\.env$

      # --- backend ---
      # Scoped to the staged files: a repo-wide --fix rewrites files you didn't touch and
      # leaves unrelated changes in the tree, which then block the commit.
      # ${@#backend/} strips the prefix: pre-commit passes repo-relative paths, and these
      # run from inside backend/.
      - id: ruff-format
        name: "backend:  format (ruff)"
        language: system
        entry: bash -c 'cd backend && uv run ruff format "${@#backend/}"' --
        types: [python]
        files: ^backend/

      - id: ruff-lint
        name: "backend:  lint (ruff)"
        language: system
        entry: bash -c 'cd backend && uv run ruff check --fix "${@#backend/}"' --
        types: [python]
        files: ^backend/

      - id: backend-tests
        name: "backend:  test (pytest)"
        language: system
        # The suite is seconds long, so it runs whole rather than trying to guess which
        # tests a staged file affects — a wrong guess here means a broken commit.
        entry: bash -c 'cd backend && uv run pytest -q'
        pass_filenames: false
        files: ^backend/.*\.py$

      - id: alembic-check
        name: "backend:  models match migrations"
        language: system
        entry: bash -c 'cd backend && uv run alembic upgrade head >/dev/null && uv run alembic check'
        pass_filenames: false
        files: ^backend/app/models\.py$

      # --- frontend ---
      - id: prettier
        name: "frontend: format (prettier)"
        language: system
        entry: bash -c 'cd frontend && yarn prettier --write "${@#frontend/}"' --
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|css|md)$

      - id: eslint
        name: "frontend: lint (eslint)"
        language: system
        entry: bash -c 'cd frontend && yarn eslint --fix "${@#frontend/}"' --
        files: ^frontend/.*\.(ts|tsx)$

      - id: tsc
        name: "frontend: typecheck"
        language: system
        entry: bash -c 'cd frontend && yarn typecheck'
        pass_filenames: false
        files: ^frontend/.*\.(ts|tsx)$

      - id: vitest
        name: "frontend: test (vitest)"
        # The whole suite, once. `vitest related` on the staged files looks cheaper, but
        # pre-commit partitions the file list and runs the hook on each chunk in parallel
        # — ten vitest processes at once, tripping over each other. The suite takes
        # seconds; determinism is worth more than the seconds.
        language: system
        entry: bash -c 'cd frontend && yarn vitest run'
        pass_filenames: false
        files: ^frontend/src/.*\.(ts|tsx)$
